<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Cleaner Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center text-white">
    <div class="max-w-md w-full mx-4 p-8 bg-slate-900/80 backdrop-blur-md rounded-2xl border border-indigo-500/30 shadow-2xl text-center">
        <div class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/50">
            <i class="fas fa-broom text-3xl animate-pulse"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Email Cleaner Bot</h1>
        <p class="text-slate-400 mb-8 text-sm">One-click solution to wipe out all promotional junk and newsletters from your Gmail Inbox.</p>
        
        <a href="/auth/google" class="inline-flex items-center justify-center w-full px-6 py-3 bg-white hover:bg-slate-100 text-slate-900 font-semibold rounded-xl transition duration-300 transform hover:-translate-y-1 shadow-lg gap-3">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/rcodex.png" class="w-5 h-5" alt="Google">
            Sign in with Google
        </a>
    </div>
</body>
</html>
